name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin & manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin & marketplace manifests
        run: |
          python3 - <<'PY'
          import json, os, sys
          fail = []
          # 1. JSON parses
          for f in (".claude-plugin/plugin.json", ".claude-plugin/marketplace.json", "hooks/hooks.json"):
              try:
                  json.load(open(f))
              except Exception as e:
                  fail.append(f"{f}: invalid JSON ({e})")
          # 2. plugin.json required fields
          pj = json.load(open(".claude-plugin/plugin.json"))
          for k in ("name", "version", "description"):
              if not pj.get(k):
                  fail.append(f"plugin.json missing required field: {k}")
          # 3. each marketplace plugin source resolves to a real plugin.json
          mp = json.load(open(".claude-plugin/marketplace.json"))
          for p in mp.get("plugins", []):
              src = p.get("source", "")
              target = os.path.normpath(os.path.join(".", src, ".claude-plugin/plugin.json"))
              if not os.path.isfile(target):
                  fail.append(f"marketplace plugin '{p.get('name')}' source '{src}' has no plugin.json")
          # 4. hooks.json must nest events under a top-level "hooks" key (plugin format)
          hk = json.load(open("hooks/hooks.json"))
          if "hooks" not in hk:
              fail.append('hooks.json: event handlers must be nested under a top-level "hooks" key')
          if fail:
              print("\n".join("FAIL: " + x for x in fail))
              sys.exit(1)
          print("OK: manifests valid")
          PY

      - name: Component frontmatter present
        run: |
          for f in commands/*.md agents/*.md skills/*/SKILL.md; do
            head -1 "$f" | grep -q '^---$' || { echo "FAIL: missing YAML frontmatter in $f"; exit 1; }
          done
          echo "OK: all commands/agents/skills have frontmatter"

      - name: Shell scripts parse
        run: |
          for s in install.sh uninstall.sh hooks/bootstrap-cli.sh hooks/enforce-korean-audit.sh hooks/enforce-korean-stop.sh tests/smoke.sh scripts/check-korean-naturalness.sh; do
            bash -n "$s" && echo "OK: $s"
          done

      - name: Korean naturalness regression guard
        run: bash scripts/check-korean-naturalness.sh

      - name: CLI contract — krdict exposes every flag the docs reference
        run: |
          # bin/krdict is stdlib-only, so --help runs without installing anything.
          help="$(python3 bin/krdict --help 2>&1)"
          for f in --translated --trans-lang --pos --method --num --context -k -u -x -a; do
            echo "$help" | grep -q -- "$f" || { echo "FAIL: krdict --help is missing '$f' but the docs use it"; exit 1; }
          done
          echo "OK: krdict exposes all doc-referenced flags"

  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: kollocate smoke test
        run: bash tests/smoke.sh
