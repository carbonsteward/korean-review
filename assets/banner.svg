<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="280" viewBox="0 0 1000 280" role="img" aria-label="짝말 jjakmal banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#1b3a4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4cc9b0"/>
      <stop offset="1" stop-color="#80ffdb"/>
    </linearGradient>
    <style>
      .t  { font-family: 'Helvetica Neue', Arial, sans-serif; }
      .title  { font-size: 58px; font-weight: 800; fill: #ffffff; }
      .sub    { font-size: 21px; font-weight: 400; fill: #add9d0; }
      .chip   { font-size: 18px; font-weight: 600; fill: #0d1b2a; }
      .han    { font-size: 22px; font-weight: 700; fill: url(#accent); }
    </style>
  </defs>

  <rect width="1000" height="280" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="280" fill="url(#accent)"/>

  <!-- glyph mark: magnifier over 한 -->
  <g transform="translate(74,140)">
    <circle r="46" fill="none" stroke="url(#accent)" stroke-width="6"/>
    <line x1="33" y1="33" x2="64" y2="64" stroke="url(#accent)" stroke-width="9" stroke-linecap="round"/>
    <text class="t han" x="0" y="9" text-anchor="middle" style="font-size:40px">짝</text>
  </g>

  <text class="t title" x="170" y="120">짝말 · jjakmal</text>
  <text class="t sub"   x="172" y="158">Evidence-based Korean naturalness &amp; collocation verification</text>
  <text class="t sub"   x="172" y="186" style="font-size:18px; fill:#7fb7ab">한국어 연어·자연성 검증 toolchain — corpus &amp; dictionary, not vibes</text>

  <!-- tool chips -->
  <g transform="translate(172,212)">
    <rect x="0"   y="0" width="150" height="34" rx="17" fill="url(#accent)"/>
    <text class="t chip" x="75"  y="23" text-anchor="middle">kollocate</text>
    <rect x="166" y="0" width="110" height="34" rx="17" fill="url(#accent)"/>
    <text class="t chip" x="221" y="23" text-anchor="middle">krdict</text>
    <rect x="292" y="0" width="210" height="34" rx="17" fill="url(#accent)"/>
    <text class="t chip" x="397" y="23" text-anchor="middle">korpora-search</text>
  </g>
</svg>
